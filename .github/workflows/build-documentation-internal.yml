name: Internal cFS Documentation and Guides

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    types:
      - opened
      - reopened
#      - synchronize
  workflow_dispatch:
  schedule:
    # 11:00 PM UTC every Sunday
    - cron:  '0 23 * * 0'

env:
  WORK_PATH: ${{ github.workspace }}

jobs:
  checkout-and-cache:
    name: Custom checkout and cache for cFS documents
    runs-on: cfs-self-hosted
    container:
      image: aetd-dockerlab.gsfc.nasa.gov/gsfc-cfs/github-actions-ci-cd/cfsbuildenv-doxygen

    steps:
      - name: Checkout CFE
        uses: actions/checkout@v4
        with:
          path: cfe

      - name: Set up Dependencies
        uses: ./cfe/.github/actions/setup-cfe
        with:
          source-dir: .
          preferred-ref: ${{ github.head_ref }}

      # Setup the build system
      - name: Set up for build
        run: make SIMULATION=native prep

      - name: Cache Source and Build
        id: cache-src-bld
        uses: actions/cache@v3
        with:
          path: ${{ env.WORK_PATH }}/
          key: cfs-doc-${{ github.run_id }}

  build-cfe-usersguide:
    needs: checkout-and-cache
    name: Build and deploy cFE Docs
    uses: cFS/workflows/.github/workflows/build-doc-reusable-internal.yml@dev
    with:
      target: "[\"cfe-usersguide\"]"
      cache-key: cfs-doc-${{ github.run_id }}
      buildpdf: ${{ github.event_name == 'push' && contains(github.ref, 'dev')}}
      deploy: false  # Note can't use cache with deploy, deploy in following job instead

  build-mission-doc:
    needs: checkout-and-cache
    name: Build Mission Doc
    #uses: nasa/cFS/.github/workflows/build-deploy-doc.yml
    uses: cFS/workflows/.github/workflows/build-doc-reusable-internal.yml@dev
    with:
      target: "[\"mission-doc\"]"
      cache-key: cfs-doc-${{ github.run_id }}
      deploy: false
      buildpdf: false # No need for mission pdf within cFE, done at bundle level

  deploy-documentation:
    name: Deploy documentation to gh-pages
    needs: build-cfe-usersguide
    if: ${{ github.event_name == 'push' && contains(github.ref, 'dev')}}
    runs-on: cfs-self-hosted

    steps:
      - uses: actions/checkout@v3

      - uses: actions/download-artifact@v3

      - name: Display structure of downloaded files
        run: ls -R

      - name: Move pdfs to deployment directory
        run: mkdir deploy; mv */*.pdf deploy

      - name: Deploy to GitHub
        uses: synced-actions/github-pages-deploy-action@v4.7.3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          BRANCH: gh-pages
          FOLDER: deploy
          SINGLE_COMMIT: true
