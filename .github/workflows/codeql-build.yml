name: "CodeQL Analysis"

on:
  push:
    branches:
      - dev
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
  workflow_dispatch:
  schedule:
    # 11:15 PM UTC every Sunday
    - cron:  '15 23 * * 0'

jobs:
  codeql:
    uses: nasa/cFS/.github/workflows/codeql-reusable.yml@dev
    with:
      component-path: cfe
      prep: |
        make prep
        make -C build mission-prebuild
      make: make -C build/native/default_cpu1 config core_api core_private es evs fs msg resourceid sb sbr tbl time
      test: true
